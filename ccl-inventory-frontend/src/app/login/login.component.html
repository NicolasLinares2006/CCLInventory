<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>CCL Inventory System</h2>
      <p class="login-description">Ingresa tus credenciales para continuar</p>
    </div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          id="username"
          type="text" 
          formControlName="username"
          class="form-control"
          [class.is-invalid]="f['username'].touched && f['username'].errors"
          placeholder="nombre.usuario">
        
        <div *ngIf="f['username'].touched && f['username'].errors" class="invalid-feedback">
          <span *ngIf="f['username'].errors?.['required']">El usuario es obligatorio</span>
          <span *ngIf="f['username'].errors?.['minlength']">Mínimo 3 caracteres</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          id="password"
          type="password" 
          formControlName="password"
          class="form-control"
          [class.is-invalid]="f['password'].touched && f['password'].errors"
          placeholder="••••••••">
        
        <div *ngIf="f['password'].touched && f['password'].errors" class="invalid-feedback">
          <span *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria</span>
          <span *ngIf="f['password'].errors?.['minlength']">Debe tener al menos 6 caracteres</span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading">Verificando...</span>
      </button>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>
      
    </form>
  </div>
</div>
